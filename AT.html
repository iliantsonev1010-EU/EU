    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #e8f4f8 0%, #f5f9fc 100%); color: #333; line-height: 1.8; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #1e6fbf; font-size: 36px; margin-bottom: 25px; font-weight: 700; }
        .section { background: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 8px 32px rgba(30,111,191,0.1); border: 1px solid rgba(30,111,191,0.08); animation: slideUp 0.5s ease-out; }
        .section h2 { color: #1e6fbf; font-size: 26px; margin-bottom: 20px; border-bottom: 3px solid #1e6fbf; padding-bottom: 10px; font-weight: 600; }
        .section p { color: #555; font-size: 16px; line-height: 1.9; margin-bottom: 20px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 25px; }
        .photo-item { position: relative; overflow: hidden; border-radius: 10px; box-shadow: 0 8px 32px rgba(30,111,191,0.1); border: 1px solid rgba(30,111,191,0.08); cursor: pointer; }
        .photo-item img { width: 100%; height: 250px; object-fit: cover; transition: transform 0.4s ease; }
        .photo-item:hover img { transform: scale(1.08); }
        .photo-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: white; padding: 20px; font-size: 15px; font-weight: 600; }
            .back-button {
            display: inline-block;
            </div>
            <script>
                function showSection(sectionName) {
                    const sections = document.querySelectorAll('.section');
                    sections.forEach(s => s.classList.remove('active'));
                    const buttons = document.querySelectorAll('.menu-btn');
                    buttons.forEach(b => b.classList.remove('active'));

                    const matches = Array.from(sections).filter(s => {
                        const h2 = s.querySelector('h2');
                        return h2 && h2.textContent.includes(sectionName);
                    });
                    if (matches.length) matches[0].classList.add('active');

                    const targetButton = Array.from(buttons).find(b => b.textContent.includes(sectionName));
                    if (targetButton) targetButton.classList.add('active');
                }

                window.addEventListener('load', function() {
                    const firstSection = document.querySelector('.section');
                    if (firstSection) firstSection.classList.add('active');
                    const firstButton = document.querySelector('.menu-btn');
                    if (firstButton) firstButton.classList.add('active');
                });
            </script>
        <h2>География</h2>

        <div class="photo-grid">

    <div class="section">

        <p>💶 Австрия използва евро (EUR) като национална валута. Икономиката е силна, основана на услуги, производство и туризъм. Австрия е известна със своята технологична развитост и висок стандарт на живот.</p>

    <div class="section">
        <h2>Забележителности</h2>
        <p>🏰 Австрия е известна със дворца Шьонбрун, красивите Алпи за skiing, и музиката на Моцарт. Озеро Нойзидлер е популярно място за отдих. Венецианската карнавална традиция влияе върху австрийските празници.</p>

            <div class="photo-item">

</div>
    <script>
            function showSection(sectionName) {
                // Скриване на всички секции
                const sections = document.querySelectorAll('.section');
                sections.forEach(s => s.classList.remove('active'));
                
                // Премахване на активен клас от бутоните
            <script>
                (function(){
                    if(!document.getElementById('dev-banner-styles')){
                        const s = document.createElement('style');
                        s.id = 'dev-banner-styles';
                        s.textContent = `
        .dev-pill{background:#fff3cd;color:#856404;padding:6px 10px;border-radius:999px;border:1px solid #ffeeba;font-weight:700;display:inline-block}
        .timer{width:70px;height:10px;background:linear-gradient(90deg,#1e6fbf,#0a7fd1);border-radius:999px;position:relative;overflow:hidden;display:inline-block}
        .timer::after{content:'';position:absolute;left:-40%;top:0;width:40%;height:100%;background:rgba(255,255,255,0.4);transform:skewX(-20deg);animation:run 2s linear infinite}
        @keyframes run{to{left:120%}}
        .dev-banner{display:flex;justify-content:center;margin:16px 0}
        `;
                        document.head.appendChild(s);
                    }
                    const back = document.querySelector('.back-button');
                    if(back) back.textContent = '← Обратно към началната страница';
                    const labels = ['География','Население','Столица','История','Валута','Забележителности'];
                    const buttons = document.querySelectorAll('.country-menu .menu-btn');
                    buttons.forEach((b,i)=>{ if(labels[i]){ b.textContent = labels[i]; b.onclick = ()=> showSection(labels[i]); }});
                    if(!document.querySelector('.dev-banner')){
                        const menu = document.querySelector('.country-menu');
                        const banner = document.createElement('div');
                        banner.className = 'dev-banner';
                        banner.innerHTML = '<span class="dev-pill">В процес на разработка</span><div class="timer" aria-hidden="true" style="margin-left:10px"></div>';
                        if(menu) menu.insertAdjacentElement('afterend', banner);
                    }
                    const secs = document.querySelectorAll('.section');
                    if(secs.length){ secs.forEach(s=>s.classList.remove('active')); secs[0].classList.add('active'); }
                })();
            </script>
                const buttons = document.querySelectorAll('.menu-btn');
                buttons.forEach(b => b.classList.remove('active'));
                
                // Показване на избраната секция
                const targetSection = document.getElementById(sectionName);
                if (targetSection) {
                    targetSection.classList.add('active');
                }
                
                // Активиране на съответния бутон
                const targetButton = Array.from(buttons).find(b => b.textContent.includes(sectionName === 'Площ' ? 'География' : sectionName));
                if (targetButton) {
                    targetButton.classList.add('active');
                }
            }
            
            // Показване на първата секция при зареждане
            window.addEventListener('load', function() {
                const firstSection = document.querySelector('.section');
                if (firstSection) {
                    firstSection.classList.add('active');
                }
                
                const firstButton = document.querySelector('.menu-btn');
                if (firstButton) {
                    firstButton.classList.add('active');
                }
            });
        </script>

    @keyframes run{to{left:120%}}
    .dev-banner{display:flex;justify-content:center;margin:16px 0}
    `;
                    document.head.appendChild(s);
                }

                const labels = ['География','Население','Столица','История','Валута','Забележителности'];
                const buttons = document.querySelectorAll('.country-menu .menu-btn');
                buttons.forEach((b,i)=>{ if(labels[i]){ b.textContent = labels[i]; b.onclick = ()=> showSection(labels[i]); }});
                if(!document.querySelector('.dev-banner')){

                    const banner = document.createElement('div');
                    banner.className = 'dev-banner';

                    if(menu) menu.insertAdjacentElement('afterend', banner);
                }
                const secs = document.querySelectorAll('.section');
