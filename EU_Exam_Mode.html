<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Режим Изпитвай ме — EU Explorer</title>
  <style>
    body{font-family:Poppins,Arial;background:linear-gradient(135deg, #e8f4f8 0%, #f5f9fc 100%);padding:20px;color:#0f2d47}
    .card{max-width:900px;margin:0 auto;background:white;padding:20px;border-radius:12px;box-shadow: 0 8px 32px rgba(30,111,191,0.1); border: 1px solid rgba(30,111,191,0.08)}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    button.play{background:#1e6fbf;color:white;padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
    .question{margin-top:16px;padding:12px;border-radius:8px;border:1px solid #eef6ff}
    .timer{font-weight:700;color:#1451a3}
  </style>
</head>
<body>
  <div class="card">
    <a href="index1.html" style="color:#1e6fbf">← Обратно</a>
    <h1>⏱️ Режим „Изпитвай ме“</h1>
    <p>Избери клас и време за теста. Анализ след края.</p>

    <div class="controls">
      <label>Клас:
        <select id="grade"><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select>
      </label>

      <label>Време (мин):
        <select id="minutes"><option>5</option><option selected>10</option><option>20</option><option>30</option></select>
      </label>

      <button class="play" id="startBtn">Започни тест</button>
    </div>

    <div id="examArea" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
        <div class="timer">Остава: <span id="timeLeft">00:00</span></div>
        <div id="progress">Въпрос <span id="qIdx">0</span>/<span id="qTotal">0</span></div>
      </div>

      <div id="questionBox"></div>
      <div style="margin-top:12px"><button onclick="nextQ()" class="play">Следващ</button></div>
    </div>

    <div id="results" style="display:none;margin-top:16px"></div>
  </div>

  <script>
    // Minimal question bank (demo). Can be expanded / pulled from EU_Quiz
    const BANK = [
      {q:'Кога е подписан Договорът от Рим?',opts:['1957','1945','1973','1992'],a:0},
      {q:'Коя институция предлага законодателство?',opts:['Европарламент','Комисията','Съдът','НАТО'],a:1},
      {q:'Колко страни са в ЕС?',opts:['27','28','25','30'],a:0},
      {q:'Коя програма подпомага студентска размяна?',opts:['Erasmus+','Horizon','EIB','Copernicus'],a:0},
      {q:'Коя държава използва еврото?',opts:['Швеция','Полша','Испания','Дания'],a:2}
    ];

    let questions=[], current=0, score=0, timerId=null, secondsLeft=0;

    // If there's a pending exam generated by AI, load it
    const pendingRaw = localStorage.getItem('pending_exam');
    if(pendingRaw){
      try{
        const pending = JSON.parse(pendingRaw);
        if(pending.questions && pending.questions.length>0){
          questions = pending.questions;
          document.getElementById('qTotal').textContent = questions.length;
          document.getElementById('examArea').style.display='block';
          document.getElementById('results').style.display='none';
          // default timer 10 minutes
          secondsLeft = parseInt(document.getElementById('minutes').value)*60;
          showQ();
        }
      }catch(e){console.warn('invalid pending exam', e)}
    }

    document.getElementById('startBtn').addEventListener('click', ()=>{
      const mins=parseInt(document.getElementById('minutes').value);
      secondsLeft=mins*60;
      questions = shuffle(BANK).slice(0,5);
      current=0;score=0;
      document.getElementById('qTotal').textContent=questions.length;
      document.getElementById('examArea').style.display='block';
      document.getElementById('results').style.display='none';
      showQ();
      timerId=setInterval(()=>{
        secondsLeft--;
        updateTimer();
        if(secondsLeft<=0){clearInterval(timerId); finishExam();}
      },1000);
    });

    function updateTimer(){
      const m=Math.floor(secondsLeft/60);const s=secondsLeft%60;
      document.getElementById('timeLeft').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }

    function showQ(){
      const item=questions[current];
      document.getElementById('qIdx').textContent=current+1;
      const box=document.getElementById('questionBox');
      box.innerHTML=`<div class='question'><strong>${item.q}</strong><div style='margin-top:8px'>${item.opts.map((o,i)=>`<div><label><input type=radio name=opt value=${i}> ${o}</label></div>`).join('')}</div></div>`;
    }

    function nextQ(){
      const picked=document.querySelector('input[name=opt]:checked');
      if(!picked){alert('Избери опция.');return}
      const val=parseInt(picked.value);
      if(val===questions[current].a) score++;
      current++;
      if(current<questions.length) showQ(); else finishExam();
    }

    function finishExam(){
      clearInterval(timerId);
      document.getElementById('examArea').style.display='none';
      const percent=Math.round((score/questions.length)*100);
      document.getElementById('results').style.display='block';
      document.getElementById('results').innerHTML=`<h3>Резултат: ${score}/${questions.length} (${percent}%)</h3><p>Анализ: Въпроси правилни: ${score}, грешни: ${questions.length-score}</p><p><button onclick="window.location.href='EU_Quiz.html'">Виж пълен Quiz</button></p>`;

      // Save to profile history (localStorage)
      const history = JSON.parse(localStorage.getItem('eu_exam_history')||'[]');
      history.push({ts:Date.now(),score, outOf:questions.length, grade:document.getElementById('grade').value});
      localStorage.setItem('eu_exam_history', JSON.stringify(history));

      // also attach to current user profile if logged in
      const currentUser = localStorage.getItem('eu_current_user');
      if(currentUser){
        const raw = localStorage.getItem('eu_profile_'+currentUser);
        let prof = raw ? JSON.parse(raw) : {username:currentUser, role:'student', history:[], favorites:[]};
        prof.history = prof.history || [];
        prof.history.unshift({ts:Date.now(),score, outOf:questions.length, grade:document.getElementById('grade').value});
        localStorage.setItem('eu_profile_'+currentUser, JSON.stringify(prof));
      }

      // clear pending exam
      localStorage.removeItem('pending_exam');
    }

    function shuffle(a){return a.sort(()=>Math.random()-0.5)}
  </script>

  <button style="position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(90deg,#1e6fbf,#1451a3);color:white;border:none;cursor:pointer" onclick="window.location.href='Virtual_Assistant.html'">🤖</button>
</body>
</html>
