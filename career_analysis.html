<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI анализ на интересите</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif;margin:0;color:#222;background:#f5f9fc}
    header{background:#0a6fbf;color:#fff;padding:16px 20px;display:flex;align-items:center}
    header h1{font-size:18px;margin:0}
    .container{max-width:900px;margin:20px auto;padding:0 16px}
    .btn{background:#0a6fbf;color:#fff;padding:8px 10px;border:none;border-radius:8px;cursor:pointer}
    .muted{color:#666}
  </style>
</head>
<body>
  <header>
    <a href="career_hub.html" style="background:#fff;color:#0a6fbf;padding:8px 10px;border-radius:8px;text-decoration:none;margin-right:12px">← Център</a>
    <h1>AI анализ на интересите</h1>
  </header>
  <div class="container">
    <p class="muted">Анализира активности и предлага препоръки.</p>
    <div style="margin-top:12px">
      <button class="btn" onclick="runAnalysis()">Стартирай анализ</button>
      <div id="analysis-result" style="margin-top:12px"></div>
    </div>
  </div>

  <script>
    function runAnalysis(){ const log = JSON.parse(localStorage.getItem('activity_log')||'[]'); const counts = {}; log.forEach(e=>{ counts[e.role]=(counts[e.role]||0)+1; }); const top = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]); document.getElementById('analysis-result').innerHTML = `<div class=muted>Най-интересни дейности: ${top.join(', ') || 'липсват данни'}</div><div style="margin-top:8px"><h4>Препоръки</h4><div class=muted>Разгледайте професии: ${top.slice(0,3).join(', ') || '—'}</div></div>`; }
  </script>
</body>
</html>
