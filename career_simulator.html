<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Симулатор на професии</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif;margin:0;color:#222;background:#f5f9fc}
    header{background:#0a6fbf;color:#fff;padding:16px 20px;display:flex;align-items:center}
    header h1{font-size:18px;margin:0}
    .container{max-width:900px;margin:20px auto;padding:0 16px}
    .muted{color:#666;font-size:14px}
    .btn{background:#0a6fbf;color:#fff;padding:8px 10px;border:none;border-radius:8px;cursor:pointer}
    .input{padding:8px;border:1px solid #ccc;border-radius:6px;width:100%}
  </style>
</head>
<body>
  <header>
    <a href="career_hub.html" style="background:#fff;color:#0a6fbf;padding:8px 10px;border-radius:8px;text-decoration:none;margin-right:12px">← Център</a>
    <h1>Симулатор на професии</h1>
  </header>
  <div class="container">
    <p class="muted">Изберете професия и изпълнете кратка задача, за да тествате уменията си.</p>
    <div style="display:flex;gap:16px;margin-top:12px">
      <div style="width:320px">
        <label>Избери професия</label>
        <select id="sim-prof" onchange="loadSim(this.value)">
          <option value="programmer">Програмист</option>
          <option value="diplomat">Дипломат в ЕС</option>
          <option value="scientist">Учен</option>
          <option value="engineer">Инженер</option>
        </select>
        <div style="margin-top:12px"><button class="btn" onclick="startTask()">Старт</button></div>
        <div id="sim-result" style="margin-top:12px" class="muted"></div>
      </div>
      <div style="flex:1">
        <div id="sim-task"><h3>Инструкции</h3><p class="muted">Натиснете "Старт", за да получите задача.</p></div>
      </div>
    </div>
  </div>

  <script>
    function loadSim(key){ const container = document.getElementById('sim-task'); container.innerHTML = '<h3>Инструкции</h3><p class="muted">Натиснете Старт, за да получите задача за ' + key + '.</p>'; }
    function startTask(){
      const key = document.getElementById('sim-prof').value;
      const container = document.getElementById('sim-task');
      if(key==='programmer'){
        container.innerHTML = `<h3>Задача: Реверс на текст</h3><p class="muted">Напишете обратно (reverse) текста 'hello' и натиснете Провери.</p><input id="prog-answer" class="input" placeholder="въведи отговор"><div style="margin-top:8px"><button class="btn" onclick="checkProgrammer()">Провери</button></div>`;
      } else if(key==='diplomat'){
        container.innerHTML = `<h3>Сценарий: Дипломатическа среща</h3><p class="muted">Как бихте отговорили при конфликт между две страни?</p><div><button onclick="checkDiplomat('mediate')" class="btn">Предложа медиация</button> <button onclick="checkDiplomat('sanctions')" class="btn">Предложа санкции</button></div>`;
      } else if(key==='scientist'){
        container.innerHTML = `<h3>Задача: Средна стойност</h3><p class="muted">Изчислете средното от числата: 4,8,6</p><input id="sci-answer" class="input" placeholder="въведи число"><div style="margin-top:8px"><button class="btn" onclick="checkScientist()">Провери</button></div>`;
      } else if(key==='engineer'){
        container.innerHTML = `<h3>Задача: Избор на материал</h3><p class="muted">Изберете подходящ материал за конструкция, изискваща висока якост.</p><div><button class="btn" onclick="checkEngineer('steel')">Стомана</button> <button class="btn" onclick="checkEngineer('plastic')">Пластмаса</button></div>`;
      }
    }
    function checkProgrammer(){ const v = document.getElementById('prog-answer').value.trim(); if(v==='olleh'){ document.getElementById('sim-result').innerText='Правилно!'; localTrack('sim','programmer','success'); } else document.getElementById('sim-result').innerText='Опитай пак.'; }
    function checkDiplomat(choice){ if(choice==='mediate'){ document.getElementById('sim-result').innerText='Добър избор: медиацията показва дипломатични умения.'; localTrack('sim','diplomat','mediate'); } }
    function checkScientist(){ const v = Number(document.getElementById('sci-answer').value); if(Math.abs(v-6)==0){ document.getElementById('sim-result').innerText='Правилно!'; localTrack('sim','scientist','success'); } else document.getElementById('sim-result').innerText='Грешно, средно е 6.'; }
    function checkEngineer(choice){ if(choice==='steel'){ document.getElementById('sim-result').innerText='Изборът е правилен.'; localTrack('sim','engineer','steel'); } }
    function localTrack(area,role,result){ const log = JSON.parse(localStorage.getItem('activity_log')||'[]'); log.push({t:Date.now(),area,role,result}); localStorage.setItem('activity_log',JSON.stringify(log)); }
  </script>
</body>
</html>
