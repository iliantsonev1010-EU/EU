<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Карта на Европа</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body{font-family:'Poppins',sans-serif;margin:0;color:#222;background:#f5f9fc}
    header{background:#0a6fbf;color:#fff;padding:16px 20px;display:flex;align-items:center}
    header h1{font-size:18px;margin:0}
    .container{max-width:1100px;margin:20px auto;padding:0 16px}
    #map{height:520px;border-radius:8px}
    .muted{color:#666}
  </style>
</head>
<body>
  <header>
    <a href="career_hub.html" style="background:#fff;color:#0a6fbf;padding:8px 10px;border-radius:8px;text-decoration:none;margin-right:12px">← Център</a>
    <h1>AI Карта на Европа</h1>
  </header>
  <div class="container">
    <p class="muted">Кликни на маркер за подробности.</p>
    <div id="map"></div>
    <div id="map-details" style="margin-top:12px" class="muted"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const m = L.map('map').setView([52,10],4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
    const sample = [{code:'DE',name:'Германия',jobs:['IT','Engineering'],unis:['Technical University of Munich'],salary:'€45k'},{code:'BG',name:'България',jobs:['Business','Medicine'],unis:['Sofia University'],salary:'€9k'}];
    sample.forEach(s=>{
      const lat = s.code==='DE'?51:42.7; const lon = s.code==='DE'?10:25.3;
      L.marker([lat,lon]).addTo(m).bindPopup(`<strong>${s.name}</strong><div class=muted>Популярни: ${s.jobs.join(', ')}</div><div class=muted>Университети: ${s.unis.join(', ')}</div><div class=muted>Средна заплата: ${s.salary}</div>`).on('click',()=> showMapDetails(s));
    });
    function showMapDetails(s){ document.getElementById('map-details').innerHTML = `<h3>${s.name}</h3><div class=muted>Професии: ${s.jobs.join(', ')}</div><div class=muted>Университети: ${s.unis.join(', ')}</div><div class=muted>Средна заплата: ${s.salary}</div>`; }
  </script>
</body>
</html>
