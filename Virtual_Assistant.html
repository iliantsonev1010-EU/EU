<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виртуален асистент — EU Откривател</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #1e6fbf;
            --dark: #0f2d47;
            --light: #f5f9fc;
            --border: #e0e8f0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #f5f9fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--dark);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .assistant-window {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(30, 111, 191, 0.12);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            border: 1px solid rgba(30, 111, 191, 0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .assistant-header {
            background: linear-gradient(135deg, var(--accent) 0%, #1451a3 100%);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .assistant-header h2 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .assistant-header .emoji {
            font-size: 24px;
        }

        .assistant-header .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            opacity: 0.9;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafbfc;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(30, 111, 191, 0.3);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.user .message-bubble {
            background: var(--accent);
            color: white;
            border-radius: 16px 4px 16px 16px;
        }

        .message.assistant .message-bubble {
            background: white;
            color: var(--dark);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
        }

        .message.assistant .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #1451a3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .suggestions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin: 4px 0;
        }

        .suggestion-btn {
            padding: 8px 12px;
            background: rgba(30, 111, 191, 0.08);
            border: 1px solid rgba(30, 111, 191, 0.2);
            border-radius: 8px;
            cursor: pointer;
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: left;
        }

        .suggestion-btn:hover {
            background: rgba(30, 111, 191, 0.15);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        /* Teacher Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2,6,23,0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            width: 92%;
            max-width: 520px;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(2,6,23,0.4);
        }

        .modal h3 { margin-bottom: 8px; color: var(--accent); }
        .modal .row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap }
        .modal select, .modal input { padding:8px; border:1px solid var(--border); border-radius:8px }
        .modal .primary { background: linear-gradient(90deg,var(--accent),#1451a3); color:white; border:none; padding:10px 12px; border-radius:8px; cursor:pointer }

        .modal-backdrop.show { display:flex }

        .input-area {
            border-top: 1px solid var(--border);
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            resize: none;
            max-height: 80px;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(30, 111, 191, 0.1);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.1);
            background: #1451a3;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px;
            text-align: center;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
        }

        .empty-state h3 {
            color: var(--dark);
            font-size: 16px;
        }

        .empty-state p {
            font-size: 13px;
            color: #999;
        }

        @media (max-width: 600px) {
            .assistant-window {
                max-width: 100%;
                height: 100vh;
                border-radius: 20px 20px 0 0;
            }

            .message-bubble {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="assistant-window">
        <div class="assistant-header">
            <div>
                <h2>
                    <span class="emoji">🤖</span>
                    Виртуален асистент
                </h2>
            </div>
            <div class="status">
                <span class="status-dot"></span>
                <span>На линия</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="message-bubble">
                    Здравей! 👋 Аз съм твоят виртуален асистент за ЕС. Мога да ти помогна с въпроси за правата на учениците, študиране в ЕС, програми и много друго. Какво бих могъл да направя за теб?
                </div>
            </div>

            <div class="message assistant">
                <div class="avatar">💡</div>
                <div class="message-bubble">
                    <strong>Попробвай да попиташ:</strong>
                    <div class="suggestions">
                        <button class="suggestion-btn" onclick="sendMessage('Какви са правата ми като ученик в ЕС?')">📚 Права на ученици</button>
                        <button class="suggestion-btn" onclick="sendMessage('Коя държава е най-подходяща за обучение по ИТ?')">💻 Обучение по ИТ</button>
                        <button class="suggestion-btn" onclick="sendMessage('Какво е Erasmus+?')">✈️ Erasmus+ програма</button>
                        <button class="suggestion-btn" onclick="sendMessage('Как се движа свободно в ЕС?')">🗺️ Свободно движение</button>
                        <button class="suggestion-btn" onclick="sendMessage('Обясни ми ЕС като за 5 клас')">🧒 Обясни за 5 клас</button>
                        <button class="suggestion-btn" onclick="sendMessage('Как ЕС влияе на България?')">🇧🇬 Как влияе на България?</button>
                        <button class="suggestion-btn" onclick="sendMessage('Коя държава е най-подходяща за учене?')">🎓 Коя държава за учене?</button>
                        <button class="suggestion-btn" onclick="openTeacherModal()">👩‍🏫 AI режим „Учител“</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- AI Teacher Modal Backdrop -->
        <div class="modal-backdrop" id="teacherModal">
            <div class="modal" role="dialog" aria-modal="true">
                <h3>👩‍🏫 AI режим "Учител"</h3>
                <div class="row">
                    <label>Роля:
                        <select id="t_role"><option value="student">Ученик</option><option value="teacher">Учител</option></select>
                    </label>
                    <label>Клас:
                        <select id="t_grade"><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option></select>
                    </label>
                </div>
                <div class="row">
                    <label>Тип съдържание:
                        <select id="t_type"><option value="test">Тест</option><option value="homework">Домашно</option><option value="control">Контролно</option></select>
                    </label>
                    <label>Темa:
                        <input id="t_topic" placeholder="напр. институции, история, екология" />
                    </label>
                </div>
                <div class="row">
                    <label>Въпроси:
                        <select id="t_count"><option>5</option><option selected>10</option><option>15</option><option>20</option></select>
                    </label>
                    <div style="flex:1"></div>
                </div>
                <div style="display:flex;gap:8px;justify-content:flex-end">
                    <button class="primary" onclick="generateTeacherContent()">Генерирай</button>
                    <button onclick="closeTeacherModal()" style="padding:10px;border-radius:8px;border:1px solid var(--border)">Отказ</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea class="input-field" id="messageInput" placeholder="Напиши своя въпрос..." rows="1" onkeypress="handleKeyPress(event)"></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // EU Assistant AI Knowledge Base
        const EU_KNOWLEDGE_BASE = {
            rights: {
                keywords: ['права', 'правам', 'разпоредба', 'свобода', 'правата ми'],
                responses: [
                    'Като ученик в ЕС, имаш следните основни права:\n\n📚 **Право на образование** - Всеки гражданин на ЕС има право на качествено образование\n\n🗣️ **Свобода на изразяване** - Можеш да изразяваш своето мнение свободно\n\n⚖️ **Недискриминация** - Защитен си от дискриминация по раса, пол, религия или друго\n\n✈️ **Свобода на движение** - Можеш да живееш, учиш и работиш в която и да е страна на ЕС\n\n💼 **Право на работа** - Имаш право на справедливо заплащане и добри условия на работа'
                ]
            },
            it_studies: {
                keywords: ['ит', 'програмиране', 'технология', 'информационни технологии', 'програмирам', 'кодене', 'компютърни науки'],
                responses: [
                    'За обучение по ИТ, препоръчвам следните страни:\n\n🇩🇪 **Германия** - Силен технологичен сектор, много стипендии, Берлин е хъб за стартъпи\n\n🇸🇪 **Швеция** - Водеща в AI и машинното учене, висок стандарт на образование\n\n🇮🇪 **Ирландия** - Технологичен център на Европа, офиси на Google, Apple, Microsoft\n\n🇳🇱 **Нидерландия** - Великолепни университети, силна фокус на киберсигурност\n\n🇫🇮 **Финландия** - Образователен лидер, известна с качеството на ИТ образованието'
                ]
            },
            erasmus: {
                keywords: ['erasmus', 'размяна', 'програма', 'стипендия', 'студентски обмен'],
                responses: [
                    'Erasmus+ е както програма за студентски обмен, финансирана от ЕС! 🎓\n\n📖 **Какво е Erasmus+?**\nПрограма, която ти позволява да следваш част от образованието си в друга страна на ЕС\n\n✨ **Преимущества:**\n✅ Финансирана от ЕС (стипендия за живот)\n✅ Призната дипломата във всички страни\n✅ Развиваш международни умения\n✅ Правиш приятелства от цяла Европа\n\n🎯 **Как се кандидатствам?**\nПопитай своя училище или университет за Erasmus+ координатор\n\n💡 За повече информация: erasmusplus.ec.europa.eu'
                ]
            },
            movement: {
                keywords: ['движение', 'движам', 'пътувам', 'живея', 'работя', 'свобода на движение'],
                responses: [
                    'Свободата на движение е едно от най-важните права в ЕС! 🗺️\n\n🛂 **Какво означава?**\nЕдин гражданин на ЕС (всеки член-страна) може:\n✅ Да живее в която и да е страна на ЕС\n✅ Да работи без работно разрешение\n✅ Да пътува без паспортен контрол между Шенген страни\n✅ Да учи в университет в друга страна\n\n📝 **Какво трябва?**\nВсичко што трябва е валидна национална ID карта или паспорт\n\n🇦🇹 **Шенген зона:**\nНяма пограничен контрол между 27 европейски страни\n\n💪 Това е един от най-великите успехи на ЕС!'
                ]
            },
            languages: {
                keywords: ['език', 'говаря', 'уча', 'езици', 'езикови умения', 'многоезичие'],
                responses: [
                    'ЕС е мултилингвален регион! 🗣️\n\n📚 **Официални езици на ЕС:** 24 официални езика\n\n💡 **Съвети за изучаване на езици:**\n✅ Използвай платформи като Duolingo, Babbel\n✅ Участвай в Erasmus+ обмен\n✅ Гледай филми на други езици\n✅ Общувай в социални мрежи на других езици\n\n🌍 **Най-полезни езици за кариера:**\nАнглийски (между 90% говорят)\nНемски (технология и инженерство)\nФренски (международни организации)\n\n🎯 Многоезичието е суперсила в ЕС!'
                ]
            },
            work: {
                keywords: ['работа', 'работя', 'работен', 'заплата', 'кариера', 'работодател', 'трудова'],
                responses: [

                keywords: ['държава', 'страна', 'където', 'кој да', 'препоръчвам', 'най-добр'],

            },
            health: {

                ]
            },
            environment: {
                keywords: ['екология', 'околна среда', 'климат', 'зелен', 'възобновяем', 'енергия'],

                    'ЕС е лидер в защитата на околната среда! 🌍\n\n♻️ **Целите на ЕС:**\n✅ Климатично неутрално до 2050г\n✅ Замяна на ископаеми горива с възобновяема енергия\n✅ Защита на биоразнообразието\n✅ Намаляване на пластмасата\n\n⚡ **Возобновяеми енергийни лидери:**\n🇸🇪 Швеция - Хидро енергия\n🇩🇪 Германия - Слънчева и вятърна енергия\n🇩🇰 Дания - Вятърна енергия\n\n🎓 **Учи за екологията:**\nЕразмус+ има много програми за устойчивост!\n\n💚 Иди зелено, пази планетата!'
                ]
            },
            austria: {
                keywords: ['австрия'],
                responses: [
                    '🇦🇹 **Австрия** - Една от най-прекрасните страни на ЕС!\n\n🎼 **Музика и култура:**\nМоцарт, Щраус, опера във Виена - световния музикален център\n\n🏔️ **Природа:**\nОсновица на Алпите, прекрасни езера и планински пейзажи\n\n🎓 **Образование:**\nВисокото образование е безплатно за студенти от ЕС\n\n💼 **Икономика:**\nСилен технологичен и индустриален сектор\n\n🍺 **Живот:**\nВисок стандарт на живот, вкусна кухня, гостоприимство\n\n💡 **За ученици:**\nПрограма Erasmus+, много стипендии, интернационален дух'

            },
            germany: {

        // Chat function
        async function sendMessage(predefinedMessage = null) {
            const input = document.getElementById('messageInput');
            const message = predefinedMessage || input.value.trim();

            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';

            // Scroll to bottom
            setTimeout(() => scrollToBottom(), 0);

            // Show typing indicator
            showTypingIndicator();

            // Simulate AI thinking
            setTimeout(() => {
                removeTypingIndicator();
                const response = generateResponse(message);
                addMessage(response, 'assistant');
                scrollToBottom();
            }, 800 + Math.random() * 400);
        }

        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            if (sender === 'assistant') {
                messageDiv.innerHTML = `
                    <div class="avatar">🤖</div>
                    <div class="message-bubble">${text}</div>
                `;
            } else {
                messageDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
            }

            chatContainer.appendChild(messageDiv);
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function generateResponse(userMessage) {
            const lowerMessage = userMessage.toLowerCase();

            for (const [category, data] of Object.entries(EU_KNOWLEDGE_BASE)) {
                if (category === 'general') continue;

                for (const keyword of data.keywords) {
                    if (lowerMessage.includes(keyword)) {
                        return data.responses[Math.floor(Math.random() * data.responses.length)];
                    }
                }
            }

            return EU_KNOWLEDGE_BASE.general.responses[0];
        }

        // ---- AI Teacher modal functions ----
        function openTeacherModal() {
            document.getElementById('teacherModal').classList.add('show');
        }

        function closeTeacherModal() {
            document.getElementById('teacherModal').classList.remove('show');
        }

        function generateTeacherContent() {
            const role = document.getElementById('t_role').value;
            const grade = document.getElementById('t_grade').value;
            const type = document.getElementById('t_type').value;
            const topic = document.getElementById('t_topic').value.trim();
            const count = parseInt(document.getElementById('t_count').value, 10) || 10;

            const generated = generateTest({grade, topic, count, type});

            const header = `👩‍🏫 Генерирано от AI режим 'Учител' — ${type.toUpperCase()} (клас ${grade})`;
            const payload = header + '\n\n' + generated.text;

            // send to chat as assistant
            addMessage(payload, 'assistant');
            scrollToBottom();
            closeTeacherModal();

            // Save to localStorage
            const key = 'ai_teacher_generated';
            const history = JSON.parse(localStorage.getItem(key) || '[]');
            history.unshift({ts:Date.now(), role, grade, type, topic, count, content: generated});
            localStorage.setItem(key, JSON.stringify(history.slice(0,50)));
        }

        function generateTest({grade=8, topic='', count=10, type='test'}){
            // simple template-based generator
            const pools = {
                institutions: [
                    {q:'Коя институция предлага законодателство в ЕС?', opts:['Европейска комисия','Европейски парламент','Европейски съд','Европейски съвет'], a:1},
                    {q:'Къде се събират главите на държавите за определяне на политики?', opts:['Европейски съвет','Съдът','Комисията','Парламентът'], a:0}
                ],
                history: [
                    {q:'Коя година е подписан Договорът от Рим?', opts:['1957','1945','1973','1992'], a:0},
                    {q:'Коя държава напусна ЕС през 2020?', opts:['Великобритания','Норвегия','Швейцария','Исландия'], a:0}
                ],
                rights: [
                    {q:'Кое право е гарантирано за гражданите на ЕС?', opts:['Свобода на движение','Свобода да не плащат данъци','Право на безплатни пътешествия','Право на война'], a:0}
                ],
                erasmus: [
                    {q:'Какво представлява Erasmus+?', opts:['Програма за обмен','Военна програма','Транспортна мрежа','Медицинска карта'], a:0}
                ],
                environment: [
                    {q:'Каква е целта на Европейския зелен пакт?', opts:['Климатична неутралност','Повече ядрена енергия','Закриване на училища','Построяване на стени'], a:0}
                ]
            };

            // choose pool
            let pool = [];
            const t = topic.toLowerCase();
            if(t.includes('институ') || t.includes('instit')) pool = pools.institutions;
            else if(t.includes('истор') || t.includes('рим') ) pool = pools.history;
            else if(t.includes('прав') || t.includes('право')) pool = pools.rights;
            else if(t.includes('erasmus')) pool = pools.erasmus;
            else if(t.includes('еколог') || t.includes('климат')) pool = pools.environment;
            else {
                // mixed
                pool = [].concat(pools.institutions, pools.history, pools.rights, pools.erasmus, pools.environment);
            }

            // generate questions by rotating pool, and if needed create simple variations
            const questions = [];
            for(let i=0;i<count;i++){
                const item = pool[i % pool.length];
                const q = { ...item };
                // shuffle options
                const opts = q.opts.slice();
                for(let j=opts.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[opts[j],opts[k]]=[opts[k],opts[j]]}
                const correctIndex = opts.indexOf(q.opts[q.a]);
                questions.push({q:q.q, opts, a: correctIndex});
            }

            // format
            let text = '';
            questions.forEach((it, idx)=>{
                text += `${idx+1}. ${it.q}\n`;
                it.opts.forEach((o,oi)=>{ text += `   ${String.fromCharCode(65+oi)}. ${o}\n`; });
                text += '\n';
            });

            // answers
            text += '\nОтговори:\n';
            questions.forEach((it, idx)=>{ text += `${idx+1}. ${String.fromCharCode(65+it.a)}\n`; });

            return {questions, text};
        }

        function scrollToBottom() {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });

        // Load initial message if country parameter is provided
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const country = params.get('country');
            if (country) {
                setTimeout(() => {
                    const message = `Кажи ми повече за ${country}`;
                    sendMessage(message);
                }, 500);
            }
        });
    </script>
