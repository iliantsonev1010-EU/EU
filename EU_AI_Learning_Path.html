<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Персонализиран Learning Path — EU Guide</title>
  <style>
    body{font-family:Poppins, Arial; background:linear-gradient(135deg,#e8f4f8,#f5f9fc);padding:20px;color:#0f2d47}
    .card{background:white;padding:20px;border-radius:12px;max-width:900px;margin:0 auto;box-shadow:0 12px 30px rgba(13,71,161,0.08)}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    select,input,button{padding:10px;border:1px solid #dbe8f6;border-radius:8px}
    button.primary{background:linear-gradient(90deg,#1e6fbf,#1451a3);color:white;border:none;padding:12px 18px;border-radius:8px;cursor:pointer}
    .result{margin-top:16px;padding:14px;background:#fbfdff;border-radius:8px}
  </style>
</head>
<body>
  <div class="card">
    <h1>🤖 AI Learning Path</h1>
    <p>Персонализиране на учебен път — генерира уроци и quiz според целта.</p>

    <div class="row" style="margin-top:12px">
      <label>Роля:
        <select id="role"><option value="student">Ученик</option><option value="teacher">Учител</option><option value="guest">Гост</option></select>
      </label>

      <label>Клас:
        <select id="grade">
          <option value="5">5</option><option value="6">6</option><option value="7">7</option>
          <option value="8">8</option><option value="9">9</option><option value="10">10</option>
          <option value="11">11</option><option value="12">12</option>
        </select>
      </label>

      <label>Цел:
        <select id="goal"><option value="control">Контролно</option><option value="project">Проект</option><option value="olympiad">Олимпиада</option></select>
      </label>

      <button class="primary" id="generateBtn">Генерирай учебен път</button>
    </div>

    <div id="output" class="result" style="display:none"></div>

    <div id="aiGenerated" class="result" style="display:none;margin-top:12px"></div>
    <h3 style="margin-top:18px">Бързи опции</h3>
    <div class="row">
      <button onclick="openLesson('EU_10min')">▶ ЕС за 10 минути</button>
      <button onclick="openLesson('institutions')">▶ Как работят институциите</button>
      <button onclick="openPage('EU_Quiz.html')">▶ Бърз Quiz</button>
    </div>
  </div>

  <script>
    function openPage(p){window.location.href=p}
    function openLesson(k){window.location.href='EU_Virtual_Lessons.html#'+k}

    document.getElementById('generateBtn').addEventListener('click', ()=>{
      const role=document.getElementById('role').value;
      const grade=document.getElementById('grade').value;
      const goal=document.getElementById('goal').value;

      // Simple heuristic generator — can be replaced by server-side AI later
      const lessons=[];
      if(goal==='control'){
        lessons.push('Кратък преговор: История на ЕС (15 мин)');
        lessons.push('Ключови институции (10 мин)');
        lessons.push('Практически Quiz (20 въпроса)');
      } else if(goal==='project'){
        lessons.push('Проектни теми: „Европейски зелен пакт“');
        lessons.push('Как да подготвиш презентация (Check-list)');
        lessons.push('Ресурси и източници (Eur-Lex, Eurostat)');
      } else {
        lessons.push('Интензивна подготовка за олимпиада');
        lessons.push('Тематични тестове и задачи с решения');
        lessons.push('Напреднали политически и икономически анализи');
      }

      const quizzes = goal==='olympiad' ? ['Напреднал Quiz (25 въпроса)'] : ['Практически Quiz (20 въпроса)'];

      const html = `<strong>Препоръчан учебен път за:</strong> ${role}, клас ${grade}, цел: ${goal}<ul>${lessons.map(l=>'<li>'+l+'</li>').join('')}</ul><strong>Quiz:</strong><ul>${quizzes.map(q=>'<li>'+q+'</li>').join('')}</ul><p style="margin-top:8px"><button onclick="openPage('EU_Exam_Mode.html')" class="primary">Започни изпит</button> <button onclick="openPage('EU_Quiz.html')">Отвори Quiz</button></p>`;

      const out=document.getElementById('output');
      out.style.display='block';
      out.innerHTML=html;

      // Save to localStorage as user's learning path
      const key = 'ai_learning_path_latest';
      localStorage.setItem(key, JSON.stringify({role,grade,goal,lessons,quizzes,ts:Date.now()}));
    });

    // --- AI test generator (lightweight, same logic as assistant) ---
    function generateTestSimple(topic, count=10){
      const pools = {
        institutions: [
          {q:'Коя институция предлага законодателство в ЕС?', opts:['Европейска комисия','Европейски парламент','Европейски съд','Европейски съвет'], a:1},
          {q:'Къде се събират главите на държавите за определяне на политики?', opts:['Европейски съвет','Съдът','Комисията','Парламентът'], a:0}
        ],
        history: [
          {q:'Коя година е подписан Договорът от Рим?', opts:['1957','1945','1973','1992'], a:0},
          {q:'Коя държава напусна ЕС през 2020?', opts:['Великобритания','Норвегия','Швейцария','Исландия'], a:0}
        ],
        rights: [
          {q:'Кое право е гарантирано за гражданите на ЕС?', opts:['Свобода на движение','Свобода да не плащат данъци','Право на безплатни пътешествия','Право на война'], a:0}
        ],
        environment: [
          {q:'Каква е целта на Европейския зелен пакт?', opts:['Климатична неутралност','Повече ядрена енергия','Закриване на училища','Построяване на стени'], a:0}
        ]
      };

      let pool = [];
      const t = (topic||'').toLowerCase();
      if(t.includes('институ') ) pool = pools.institutions;
      else if(t.includes('истор') || t.includes('рим')) pool = pools.history;
      else if(t.includes('прав')) pool = pools.rights;
      else if(t.includes('еколог') || t.includes('климат')) pool = pools.environment;
      else pool = [].concat(pools.institutions, pools.history, pools.rights, pools.environment);

      const questions = [];
      for(let i=0;i<count;i++){
        const item = pool[i % pool.length];
        const opts = item.opts.slice();
        for(let j=opts.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[opts[j],opts[k]]=[opts[k],opts[j]]}
        const correct = opts.indexOf(item.opts[item.a]);
        questions.push({q:item.q, opts, a:correct});
      }

      return questions;
    }

    // UI: quick generate test from this page
    const genBtn = document.createElement('button');
    genBtn.textContent = 'AI Генерирай тест (локално)';
    genBtn.className = 'primary';
    genBtn.style.marginLeft = '8px';
    genBtn.onclick = ()=>{
      const topic = prompt('Тема за тест (напр. институции, история, екология)', 'институции') || '';
      const count = parseInt(prompt('Брой въпроси', '10')) || 10;
      const q = generateTestSimple(topic, count);
      const display = document.getElementById('aiGenerated');
      display.style.display = 'block';
      display.innerHTML = `<strong>Генериран тест — тема: ${topic} (${count} въпроса)</strong><pre style="white-space:pre-wrap">${q.map((it,idx)=>`${idx+1}. ${it.q}\n${it.opts.map((o,i)=>'   '+String.fromCharCode(65+i)+'. '+o).join('\n')}\n`).join('\n')}</pre><div style="display:flex;gap:8px"><button onclick="startPendingExam(${count})" class="primary">Започни в режим 'Изпитвай ме'</button><button onclick="saveGeneratedTest()">Запази в профил</button></div>`;
      // save pending in localStorage
      localStorage.setItem('pending_exam', JSON.stringify({questions:q, ts:Date.now(), topic}));
      // also add to ai_teacher_generated history
      const hist = JSON.parse(localStorage.getItem('ai_teacher_generated')||'[]');
      hist.unshift({ts:Date.now(), topic, count, questions:q});
      localStorage.setItem('ai_teacher_generated', JSON.stringify(hist.slice(0,50)));
    };

    document.querySelector('.controls')?.appendChild(genBtn);
    // if controls missing, append to card
    if(!document.querySelector('.controls')) document.querySelector('.card').appendChild(genBtn);

    function startPendingExam(count){ window.location.href='EU_Exam_Mode.html'; }

    function saveGeneratedTest(){ alert('Генерираният тест е записан в историята на AI материали (локално). Можеш да го отвориш от Профили.'); }
  </script>

  <!-- Floating assistant button -->
  <button style="position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(90deg,#1e6fbf,#1451a3);color:white;border:none;cursor:pointer" onclick="window.location.href='Virtual_Assistant.html'">🤖</button>
</body>
</html>
