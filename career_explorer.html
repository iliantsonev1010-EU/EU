<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EU Explorer Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Poppins',sans-serif;margin:0;color:#222;background:#f5f9fc}
    header{background:#0a6fbf;color:#fff;padding:16px 20px;display:flex;align-items:center}
    header h1{font-size:18px;margin:0}
    .container{max-width:1000px;margin:20px auto;padding:0 16px}
    .mission{padding:10px;border:1px solid #eee;border-radius:8px;margin-bottom:8px}
    .btn{background:#0a6fbf;color:#fff;padding:8px 10px;border:none;border-radius:8px;cursor:pointer}
    .muted{color:#666}
  </style>
</head>
<body>
  <header>
    <a href="career_hub.html" style="background:#fff;color:#0a6fbf;padding:8px 10px;border-radius:8px;text-decoration:none;margin-right:12px">← Център</a>
    <h1>EU Explorer Mode</h1>
  </header>
  <div class="container">
    <p class="muted">Изследвайте и печелете точки.</p>
    <div id="missions"></div>
    <div style="margin-top:12px">Точки: <span id="score">0</span></div>
    <div style="margin-top:12px"><button class="btn" onclick="collectRewards()">Събери</button></div>
  </div>

  <script>
    const missionsList = [
      {id:'m1',title:'Посети Германия',desc:'Открий IT възможности в Германия',points:20},
      {id:'m2',title:'Направи тест',desc:'Попълни кариерния тест',points:10}
    ];
    function renderMissions(){ const el=document.getElementById('missions'); el.innerHTML = missionsList.map(m=>`<div class="mission"><strong>${m.title}</strong><div class=muted>${m.desc}</div><div style="margin-top:8px"><button class="btn" onclick="startMission('${m.id}')">Старт</button></div></div>`).join(''); }
    function startMission(id){ const m = missionsList.find(x=>x.id===id); const score = Number(localStorage.getItem('explorer_score')||0) + m.points; localStorage.setItem('explorer_score',score); document.getElementById('score').innerText = score; alert('Мисията е завършена! Получени точки: '+m.points); }
    function collectRewards(){ alert('Няма налични материални награди — само точки за момента.'); }
    // init
    document.getElementById('score').innerText = localStorage.getItem('explorer_score')||0; renderMissions();
  </script>
</body>
</html>
