<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>България | EU Откривател</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #e8f4f8 0%, #f5f9fc 100%); color: #333; line-height: 1.8; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #1e6fbf; font-size: 36px; margin-bottom: 25px; font-weight: 700; }
        .section { background: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 8px 32px rgba(30,111,191,0.1); border: 1px solid rgba(30,111,191,0.08); animation: slideUp 0.5s ease-out; }
        .section h2 { color: #1e6fbf; font-size: 26px; margin-bottom: 20px; border-bottom: 3px solid #1e6fbf; padding-bottom: 10px; font-weight: 600; }
        .section p { color: #555; font-size: 16px; line-height: 1.9; margin-bottom: 20px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 25px; }
        .photo-item { position: relative; overflow: hidden; border-radius: 10px; box-shadow: 0 8px 32px rgba(30,111,191,0.1); border: 1px solid rgba(30,111,191,0.08); cursor: pointer; }
        .photo-item img { width: 100%; height: 250px; object-fit: cover; transition: transform 0.4s ease; }
        .photo-item:hover img { transform: scale(1.08); }
        .photo-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: white; padding: 20px; font-size: 15px; font-weight: 600; }
        .back-button { display: inline-block; background-color: #1e6fbf; color: white; padding: 12px 20px; text-decoration: none; border-radius: 6px; font-weight: 600; margin-bottom: 20px; cursor: pointer; border: none; transition: background-color 0.3s ease; font-family: 'Poppins', sans-serif; }
        .back-button:hover { background-color: #154a8b; }
        .country-menu { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .menu-btn { background-color: #f0f0f0; color: #1e6fbf; padding: 10px 16px; border: 2px solid #1e6fbf; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif; transition: all 0.3s ease; }
        .menu-btn:hover { background-color: #1e6fbf; color: white; }
        .menu-btn.active { background-color: #1e6fbf; color: white; }
        </div>
        <script>
            function showSection(sectionName) {
                const sections = document.querySelectorAll('.section');
                sections.forEach(s => s.classList.remove('active'));
                const buttons = document.querySelectorAll('.menu-btn');
                buttons.forEach(b => b.classList.remove('active'));

                const matches = Array.from(sections).filter(s => {
                    const h2 = s.querySelector('h2');
                    return h2 && h2.textContent.includes(sectionName);
                });
                if (matches.length) matches[0].classList.add('active');

                const targetButton = Array.from(buttons).find(b => b.textContent.includes(sectionName));
                if (targetButton) targetButton.classList.add('active');
            }

            window.addEventListener('load', function() {
                const firstSection = document.querySelector('.section');
                if (firstSection) firstSection.classList.add('active');
                const firstButton = document.querySelector('.menu-btn');
                if (firstButton) firstButton.classList.add('active');
            });
        </script>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&h=300&fit=crop" alt="Фолклор">
                <div class="photo-caption">Фолклор</div>
            </div>
        </div>
    </div>

    <div class="section" id="Столица">
        <h2>Столица</h2>
        <p>🏛️ София е столицата на България със население около 1.2 милиона жители. Град е древен, съчетава паметници от различни епохи - римски руини, византийски храмове и модерна архитектура. София е място на красивата катедрала 'Свети Александър Невски'.</p>
        <div class="facts">
            <h3>За София</h3>
            <ul>
                <li>Население: ~1.2 млн.</li>
                <li>Основана: 1879 г.</li>
                <li>Площ: 492 km²</li>
            </ul>
        </div>
        <div class="photo-grid">
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1499333763227-dd0cfb8cad5b?w=400&h=300&fit=crop" alt="Катедрала Св. Александър Невски">
                <div class="photo-caption">Катедрала Св. Александър Невски</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1549144611-11ee0d37187e?w=400&h=300&fit=crop" alt="София център">
                <div class="photo-caption">София център</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1519452575417-564c1401ecc0?w=400&h=300&fit=crop" alt="Архитектура">
                <div class="photo-caption">Архитектура</div>
            </div>
        </div>
    </div>

    <div class="section" id="История">
        <h2>История</h2>
        <p>📜 България има многовековна история - от траките и римляните до Първото и Второто българско царство. През 20-ти век преживя сложни периоди. През 2007г. България се присъедина към ЕС.</p>
        <div class="facts">
            <h3>Ключови дати</h3>
            <ul>
                <li>681 г. - Основаване на България</li>
                <li>1878 г. - Освобождение от Османска империя</li>
                <li>2007 г. - Присъединяване към ЕС</li>
            </ul>
        </div>
        <div class="photo-grid">
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1530971889385-82b55a3a3f6e?w=400&h=300&fit=crop" alt="Исторически паметници">
                <div class="photo-caption">Исторически паметници</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1552883049-6ed0e5e33707?w=400&h=300&fit=crop" alt="Музеи">
                <div class="photo-caption">Музеи</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1512763556399-612a3fb3c69f?w=400&h=300&fit=crop" alt="Антични руини">
                <div class="photo-caption">Антични руини</div>
            </div>
        </div>
    </div>

    <div class="section" id="Валута">
        <h2>Валута</h2>
        <p>💷 България използва болгарски лев (BGN). Икономиката е основана на селско стопанство, индустрия и растящия туристически сектор. България е също производител на качествено вино и роза.</p>
        <div class="facts">
            <h3>Икономика</h3>
            <ul>
                <li>Валута: Лев (BGN)</li>
                <li>БВП: ~$80 млрд.</li>
                <li>Основни отрасли: Туризъм, IT, Селско стопанство</li>
            </ul>
        </div>
        <div class="photo-grid">
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1526304640581-d334cdbbf35f?w=400&h=300&fit=crop" alt="Бизнес център">
                <div class="photo-caption">Бизнес център</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=400&h=300&fit=crop" alt="Селско стопанство">
                <div class="photo-caption">Селско стопанство</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1565373976694-5ffd006d5d4f?w=400&h=300&fit=crop" alt="Индустрия">
                <div class="photo-caption">Индустрия</div>
            </div>
        </div>
    </div>

    <div class="section" id="Забележителности">
        <h2>Забележителности</h2>
        <p>🏰 България е известна със Рилския манастир, катедралата 'Свети Александър Невски', скалните образования при Белоградчик и древния град Несебър. Черното море предлага красиви плажове и морски курорти.</p>
        <div class="facts">
            <h3>Топ атракции</h3>
            <ul>
                <li>Рилски манастир</li>
                <li>Несебър</li>
                <li>Седемте рилски езера</li>
                <li>Пловдив</li>
            </ul>
        </div>
        <div class="photo-grid">
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1550681528-1dbf460df73f?w=400&h=300&fit=crop" alt="Рилски манастир">
                <div class="photo-caption">Рилски манастир</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1518491846015-ec29a25e841c?w=400&h=300&fit=crop" alt="Несебър">
                <div class="photo-caption">Несебър</div>
            </div>
            <div class="photo-item">
                <img src="https://images.unsplash.com/photo-1509023016588-338d75e25ec1?w=400&h=300&fit=crop" alt="Черно море">
                <div class="photo-caption">Черно море</div>
            </div>
        </div>
    </div>
</div>
    <script>
    function showSection(sectionName) {
        const sections = document.querySelectorAll('.section');
        sections.forEach(s => s.classList.remove('active'));
        
        const buttons = document.querySelectorAll('.menu-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        const targetSection = document.getElementById(sectionName);
        if (targetSection) {
            targetSection.classList.add('active');
        }
        
        const targetButton = Array.from(buttons).find(b => b.textContent === sectionName);
        if (targetButton) {
            targetButton.classList.add('active');
        }
    }
    
    window.addEventListener('load', function() {
        const map = L.map('map').setView([42.7, 25.5], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        L.marker([42.7, 23.3]).addTo(map)
            .bindPopup('София - Столица на България')
            .openPopup();
    });
</script>
</div>
    <script>
        (function(){
            if(!document.getElementById('dev-banner-styles')){
                const s = document.createElement('style');
                s.id = 'dev-banner-styles';
                s.textContent = `
.dev-pill{background:#fff3cd;color:#856404;padding:6px 10px;border-radius:999px;border:1px solid #ffeeba;font-weight:700;display:inline-block}
.timer{width:70px;height:10px;background:linear-gradient(90deg,#1e6fbf,#0a7fd1);border-radius:999px;position:relative;overflow:hidden;display:inline-block}
.timer::after{content:'';position:absolute;left:-40%;top:0;width:40%;height:100%;background:rgba(255,255,255,0.4);transform:skewX(-20deg);animation:run 2s linear infinite}
@keyframes run{to{left:120%}}
.dev-banner{display:flex;justify-content:center;margin:16px 0}
`;
                document.head.appendChild(s);
            }
            const back = document.querySelector('.back-button');
            if(back) back.textContent = '← Обратно към началната страница';
            const labels = ['География','Население','Столица','История','Валута','Забележителности'];
            const buttons = document.querySelectorAll('.country-menu .menu-btn');
            buttons.forEach((b,i)=>{ if(labels[i]){ b.textContent = labels[i]; b.onclick = ()=> showSection(labels[i]); }});
            if(!document.querySelector('.dev-banner')){
                const menu = document.querySelector('.country-menu');
                const banner = document.createElement('div');
                banner.className = 'dev-banner';
                banner.innerHTML = '<span class="dev-pill">В процес на разработка</span><div class="timer" aria-hidden="true" style="margin-left:10px"></div>';
                if(menu) menu.insertAdjacentElement('afterend', banner);
            }
            const secs = document.querySelectorAll('.section');
            if(secs.length){ secs.forEach(s=>s.classList.remove('active')); secs[0].classList.add('active'); }
        })();
    </script>
</body>
</html>
